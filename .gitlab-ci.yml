variables:
  REGISTRY: registry.gitlab.gnome.org/gnome/pygobject

image: $REGISTRY/ci:$CI_PIPELINE_ID

stages:
  - pre_build
  - build_and_test
  - coverage
  - deploy

cache:
  paths:
    - _ccache/
    - $HOME/.cache/pip/

build-image:
  stage: pre_build
  interruptible: true
  image: quay.io/buildah/stable:latest
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot
    CACHE: registry.gitlab.gnome.org/gnome/pygobject/cache
  # rules:
  #   - changes:
  #     - ".gitlab-ci/Dockerfile"
  #     - ".gitlab-ci/set_env.sh"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - buildah --root .containers build -t $REGISTRY/ci:$CI_PIPELINE_ID --layers --cache-from=$CACHE --cache-to=$CACHE -f Dockerfile .gitlab-ci
    - buildah --root .containers push $REGISTRY/ci:$CI_PIPELINE_ID
    # if branch is main -> also push main:latest
  cache:
    paths:
      - .containers/overlay-images

# tag-image:
#   rules:
#     - if: true
#       changes:
#         - ".gitlab-ci/Dockerfile"
#         - ".gitlab-ci/set_env.sh"
#       when: never
#     - when: on_success
#   script:
#     - gitlab-ci/docker-tag.sh main:latest main:$CI_PIPELINE_ID

.defaults:
  stage: build_and_test
  needs:
    - build-image
  artifacts:
    when: always
    paths:
      - coverage/
      - test-results.xml
    reports:
      junit: test-results.xml
  script:
    - bash -x ./.gitlab-ci/test-docker.sh

.mingw-defaults:
  stage: build_and_test
  tags:
    - win32-ps
  artifacts:
    when: always
    paths:
      - coverage/
      - test-results.xml
    reports:
      junit: test-results.xml
  script:
    - $env:CHERE_INVOKING = 'yes'
    - C:\msys64\usr\bin\pacman --noconfirm -Syyuu
    - C:\msys64\usr\bin\bash -lc "bash -x ./.gitlab-ci/test-msys2.sh"

coverage:
  stage: coverage
  artifacts:
    paths:
      - coverage/
  variables:
    PYTHON_VERSION: "3.9"
  script:
    - bash -x ./.gitlab-ci/coverage-docker.sh
  coverage: '/^\s+lines\.+:\s+([\d.]+\%)\s+/'

pages:
  stage: deploy
  dependencies:
    - coverage
  before_script:
    - python -m pip install "pdm!=2.17.3"
    - python -m pdm install -v
  script:
    - python -m pdm run sphinx-build -T -E -W --keep-going -b html -d _build/doctrees -D language=en docs/ public
    - mv coverage/ public/
  artifacts:
    paths:
      - public
    expire_in: 30 days
  only:
    - main

sdist:
  stage: build_and_test
  artifacts:
    paths:
      - dist/
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - bash -x ./.gitlab-ci/build-sdists.sh

mingw32:
  extends: .mingw-defaults
  variables:
    MSYSTEM: "MINGW32"

mingw64:
  extends: .mingw-defaults
  variables:
    MSYSTEM: "MINGW64"

python3.9-gtk3:
  extends: .defaults
  variables:
    PYTHON_VERSION: "3.9"
    TEST_GTK_VERSION: "3.0"

python3.10-gtk3:
  extends: .defaults
  variables:
    PYTHON_VERSION: "3.10"
    TEST_GTK_VERSION: "3.0"

python3.11-gtk3:
  extends: .defaults
  variables:
    PYTHON_VERSION: "3.11"
    TEST_GTK_VERSION: "3.0"

python3.11-gtk4:
  extends: .defaults
  variables:
    PYTHON_VERSION: "3.11"
    TEST_GTK_VERSION: "4.0"

python3.12-gtk3:
  extends: .defaults
  variables:
    PYTHON_VERSION: "3.12"
    TEST_GTK_VERSION: "3.0"

python3.13-gtk4:
  extends: .defaults
  variables:
    PYTHON_VERSION: "3.13"
    TEST_GTK_VERSION: "4.0"

pypy3-gtk3:
  extends: .defaults
  variables:
    PYTHON_VERSION: "pypy3"
    TEST_GTK_VERSION: "3.0"

gnome-master:
  stage: build_and_test
  image: quay.io/gnome_infrastructure/gnome-runtime-images:gnome-master
  tags:
    - flatpak
  artifacts:
    paths:
      - coverage/
  variables:
    TEST_GTK_VERSION: "3.0"
  script:
    - bash -x ./.gitlab-ci/test-flatpak.sh

gnome-master-gtk4:
  allow_failure: true
  stage: build_and_test
  image: quay.io/gnome_infrastructure/gnome-runtime-images:gnome-master
  tags:
    - flatpak
  artifacts:
    paths:
      - coverage/
  variables:
    TEST_GTK_VERSION: "4.0"
  script:
    - bash -x ./.gitlab-ci/test-flatpak.sh

python3.12-pdm:
  stage: build_and_test
  variables:
    PYTHON_VERSION: "3.12"
    TEST_GTK_VERSION: "3.0"
  before_script:
    - python -m pip install "pdm!=2.17.3"
    - python -m pdm install -v
  script:
    - xvfb-run -a python -m pdm run pytest

minimal-meson:
  allow_failure: true
  stage: build_and_test
  image: quay.io/fedora/fedora:40
  before_script:
    - dnf install --assumeyes gcc meson git flex bison diffutils python3-devel python3-pytest
  script:
    - meson setup _build
    - meson compile -C _build
    - PYTEST_ADDOPTS="-sv -k 'not test_cairo'" meson test -C _build --suite pygobject --verbose
